#
# Check for:
#
# - 0 KeystoneAPI CR
# - Keystone Deployment with 0 Pods
#

apiVersion: keystone.openstack.org/v1beta1
kind: KeystoneAPI
metadata:
  finalizers:
  - openstack.org/keystoneapi
  name: keystone
spec:
  adminProject: admin
  adminUser: admin
  customServiceConfig: |
    [DEFAULT]
    debug = true
  databaseInstance: openstack
  databaseAccount: keystone
  passwordSelectors:
    admin: AdminPassword
  preserveJobs: false
  region: regionOne
  replicas: 0
  resources:
    requests:
      cpu: "1"
      memory: 500Mi
  secret: osp-secret
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
commands:
  - script: |
      dbHostTemplate='{{.status.databaseHostname}}'
      dbHostname=$(oc get -n $NAMESPACE KeystoneAPI keystone -o go-template="$dbHostTemplate")
      expectedDbHostname="openstack.$NAMESPACE.svc"
      if [ "$dbHostname" != "$expectedDbHostname" ]; then
        echo "databaseHostname mismatch: got '$dbHostname', expected '$expectedDbHostname'"
        exit 1
      fi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystone
spec:
  replicas: 0
